name: Update leaderboard

# Refresh the README leaderboard block + data/leaderboard.json from the live
# gemma-challenge board, hourly. Commits only when something actually changed.
on:
  schedule:
    - cron: "7 * * * *"      # hourly at :07 (off the top-of-hour congestion)
  workflow_dispatch: {}       # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh leaderboard from live board
        run: python scripts/update_leaderboard.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md data/leaderboard.json assets/score-evolution.svg; then
            echo "No leaderboard changes."
          else
            git config user.name "leaderboard-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md data/leaderboard.json assets/score-evolution.svg
            git commit -m "chore(leaderboard): refresh from live board ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
